<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arduino Sensor Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        .card {
            display: inline-block;
            margin: 20px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            width: 200px;
            background-color: #f9f9f9;
        }
        .card h2 {
            font-size: 24px;
        }
        .card p {
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1>Arduino Sensor Dashboard</h1>
    <div class="card">
        <h2>Sensor Value</h2>
        <p>{{ sensor_value }}</p>
    </div>
    <div class="card">
        <h2>Voltage</h2>
        <p>{{ voltage }} V</p>
    </div>
    <div class="card">
        <h2>NIR LED State</h2>
        <p>{{ nir_led_state }}</p>
    </div>
</body>
</html>
