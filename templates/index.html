<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Monitor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            background-color: #f4f4f9;
        }
        header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.5em;
            width: 100%;
        }
        nav {
            background-color: #222;
            color: white;
            width: 200px;
            height: 100vh;
            padding-top: 20px;
            position: fixed;
            top: 0;
            left: 0;
            font-size: 1.1em;
        }
        nav a {
            color: white;
            text-decoration: none;
            padding: 10px;
            display: block;
        }
        nav a:hover {
            background-color: #444;
        }
        .content {
            margin-left: 220px;
            padding: 20px;
            flex-grow: 1;
        }
        pre {
            background-color: #333;
            color: #f4f4f4;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <header>ESP32 Monitor</header>
    <nav>
        <a href="#">Home</a>
        <a href="#">Settings</a>
        <a href="#">About</a>
    </nav>
    <div class="content">
        <h1>ESP32 Output</h1>
        <pre>{{ output }}</pre>
    </div>
</body>
</html>
